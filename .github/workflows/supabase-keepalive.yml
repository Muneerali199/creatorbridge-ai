name: Supabase Keep-Alive
on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project to prevent auto-pause
        run: |
          curl -s --retry 3 --retry-delay 5 \
            "${{ secrets.SUPABASE_PROJECT_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
      - name: Log success
        run: echo "Supabase keep-alive ping sent at $(date -u)"
